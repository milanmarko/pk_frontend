name: Build Docker Image, Push to GHCR, and Deploy to Kubernetes

on:
  push:
    branches:
      - main
    workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: milanmarko
          password: ${{ secrets.PACKAGE_RW_TOKEN }}
      - name: "Generate image tag from time"
        run: echo "IMAGE_TAG=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/milanmarko/pamkutya-frontend:${{ env.IMAGE_TAG }} , ghcr.io/milanmarko/pamkutya-frontend:latest
          file: ./Dockerfile

      - uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config
      - name: Deploy to Kubernetes
        run: |
          kubectl delete -f deployment.yaml --ignore-not-found
          kubectl apply -f deployment.yaml
